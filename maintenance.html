<!-- ═══ RETURN-TO-SITE CHECK ═══
     If MAINTENANCE_MODE has been switched back to false, this page
     automatically sends the visitor back to index.html instead of
     staying stuck here. Also re-checks every 15 seconds in case
     someone is sitting on this page waiting for the site to come back. -->
<script>
  function checkIfSiteIsBack() {
    fetch('maintenance-status.js?t=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.text(); })
      .then(function(code){
        if (!/MAINTENANCE_MODE\s*=\s*true/.test(code)) {
          window.location.replace('index.html');
        }
      })
      .catch(function(){ /* if the check fails, just stay on this page */ });
  }
  checkIfSiteIsBack();
  setInterval(checkIfSiteIsBack, 15000);
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-2%, 3%) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(96,165,250,0.45); }

  html, body {

  body {

    background: radial-gradient(1200px 800px at 15% 10%, #1a4a8a55, transparent 60%),

                linear-gradient(160deg, #0a1a30 0%, #0f2744 45%, #123563 100%);
    background-size: 140% 140%, 140% 140%, 100% 100%;
    color: #eaf1fb;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before, body::after {
    content: "";
    position: absolute;
    width: 480px; height: 480px;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    animation: drift 14s ease-in-out infinite;
    z-index: 0;
  }
  body::before { background: #2563b8; top: -120px; right: -120px; }
  body::after  { background: #0f2744; bottom: -140px; left: -100px; animation-delay: 3s; }

  .card {
    position: relative;

    padding: 44px 38px 34px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: fadeUp 0.6s ease-out both;
  }

  .icon-wrap {
    width: 88px; height: 88px;
    margin: 0 auto 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #2563b8, #123563);
    border: 1px solid rgba(255,255,255,0.25);
    animation: pulseRing 2.6s ease-out infinite;
  }
  .icon-wrap svg { width: 42px; height: 42px; }

  h1 {
    font-size: 1.55rem;
    font-weight: 800;
    letter-spacing: 0.2px;
    margin-bottom: 8px;
    color: #ffffff;
  }
  .sub-en {
    font-size: 0.85rem;
    color: rgba(234,241,251,0.55);
    direction: ltr;
    letter-spacing: 0.3px;
    margin-bottom: 22px;
    font-weight: 500;
  }

  p.message {
    font-size: 1rem;
    line-height: 1.9;
    color: rgba(234,241,251,0.9);
    margin-bottom: 26px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    margin: 22px 0;
  }

  .contact-label {
    font-size: 0.82rem;
    color: rgba(234,241,251,0.6);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .contact-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #2f7bd4, #1a4a8a);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    padding: 13px 26px;
    border-radius: 14px;
    direction: ltr;
    border: 1px solid rgba(255,255,255,0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 20px rgba(37,99,184,0.35);
  }
  .contact-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 26px rgba(37,99,184,0.5);
  }
  .contact-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .dev-note {
    margin-top: 28px;
    font-size: 0.78rem;
    color: rgba(234,241,251,0.4);
    direction: ltr;
    letter-spacing: 0.2px;
  }

  @media (max-width: 420px) {
    .card { padding: 34px 22px 26px; }
    h1 { font-size: 1.3rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, body::after, .icon-wrap { animation: none; }
    .card { animation: none; }
  }
</style>
